
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeLink Facility Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            padding: 0; 
            /* overflow: hidden 제거 - 전체 스크롤 허용 */
        }
        #root { 
            min-height: 100vh; 
            /* overflow-y: auto 제거 - 브라우저 기본 스크롤 사용 */
        }
        #loading-overlay {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #f8fafc; z-index: 9999;
            transition: opacity 0.4s ease-out;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loader-spin { animation: spin 1s linear infinite; }
        .boot-error {
            display: none; position: fixed; inset: 0; background: #fff; z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center; padding: 2rem;
            text-align: center; font-family: sans-serif;
        }
    </style>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var errorDetail = '[' + new Date().toLocaleTimeString() + '] ' + msg + ' (' + (url ? url.split('/').pop() : 'unknown') + ':' + line + ')';
        console.error('Core Boot Error:', errorDetail, error);
        if (window.showBootError) window.showBootError(errorDetail);
      };

      var bootTimeout = setTimeout(function() {
        showBootError('Synchronization Timeout (25s). Check network or console.');
      }, 25000);

      function showBootError(msg) {
        const overlay = document.getElementById('loading-overlay');
        const errorDiv = document.getElementById('boot-error');
        const errorMsgContainer = document.getElementById('error-detail');
        if (overlay) overlay.style.display = 'none';
        if (errorDiv) {
          errorDiv.style.display = 'flex';
          if (errorMsgContainer) {
            errorMsgContainer.innerText = (errorMsgContainer.innerText ? errorMsgContainer.innerText + '\n' : '') + msg;
          }
        }
      }

      window.__BOOT_SUCCESS__ = function() {
        clearTimeout(bootTimeout);
      };
    </script>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "lucide-react": "https://esm.sh/lucide-react@0.468.0?deps=react@18.3.1",
    "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.3.1",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "leaflet": "https://esm.sh/leaflet@1.9.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body>
    <div id="loading-overlay">
        <div style="width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%;" class="loader-spin"></div>
        <div style="margin-top: 24px; text-align: center;">
            <p style="font-weight: 900; color: #1e293b; font-size: 14px; letter-spacing: 0.25em; margin: 0; text-transform: uppercase;">SafeLink AI</p>
            <p style="font-weight: 600; color: #94a3b8; font-size: 10px; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.1em;">Loading System Components...</p>
        </div>
    </div>
    <div id="boot-error" class="boot-error">
        <div style="background: #fff; padding: 2.5rem; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); max-width: 540px; width: 100%;">
            <h1 style="font-weight: 900; color: #0f172a; font-size: 1.5rem; margin-bottom: 1.5rem;">Boot Interrupt</h1>
            <p id="error-detail" style="color: #475569; font-size: 11px; font-family: monospace; word-break: break-all; margin: 0; line-height: 1.6;"></p>
            <button onclick="location.reload()" style="width: 100%; padding: 1.125rem; background: #6366f1; color: white; border-radius: 1.25rem; font-weight: 800; border: none; margin-top: 1.5rem;">Retry</button>
        </div>
    </div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
